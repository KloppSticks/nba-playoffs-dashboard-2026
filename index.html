<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NBA Playoffs 2026 — Predictions</title>
<style>
  :root {
    --bg: #0e141b;
    --bg-elev: #161e27;
    --bg-card: #1c2734;
    --border: #2a3647;
    --border-strong: #3a4a63;
    --text: #e8ecf2;
    --text-dim: #9ba5b4;
    --text-mute: #6b7788;
    --accent: #4a90e2;
    --green: #38c172;
    --yellow: #f2c94c;
    --red: #e74c3c;
    --fav: #6aa8ff;
    --dog: #c37dff;
    --shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.4; }
  body { padding: 0; min-height: 100vh; -webkit-font-smoothing: antialiased; }

  header { padding: 16px 20px 8px; border-bottom: 1px solid var(--border); background: var(--bg-elev); position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  header .meta { color: var(--text-mute); font-size: 11px; margin-top: 3px; }

  nav.tabs { display: flex; gap: 4px; padding: 8px 16px 0; background: var(--bg-elev); border-bottom: 1px solid var(--border); position: sticky; top: 56px; z-index: 9; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  nav.tabs button { background: none; border: none; color: var(--text-dim); font-size: 14px; font-weight: 500; padding: 10px 14px; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; font-family: inherit; min-height: 44px; }
  nav.tabs button:hover { color: var(--text); }
  nav.tabs button.active { color: var(--text); border-bottom-color: var(--accent); }

  main { padding: 16px; max-width: 1400px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }

  /* === Bracket view === */
  .round-block { margin-bottom: 28px; }
  .round-block h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .conf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .conf-grid > .conf-col h3 { font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .conf-col { min-width: 0; }
  @media (max-width: 720px) {
    .conf-grid { grid-template-columns: 1fr; gap: 8px; }
  }

  /* Matchup card */
  .slot-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; box-shadow: var(--shadow); cursor: pointer; transition: border-color 0.15s, transform 0.1s; position: relative; overflow: hidden; }
  .slot-card:hover { border-color: var(--border-strong); }
  .slot-card:active { transform: scale(0.995); }
  .slot-card .slot-id { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .slot-card .team-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; gap: 8px; min-height: 32px; }
  .slot-card .team-row:not(:last-child) { border-bottom: 1px solid var(--border); }
  .slot-card .team-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .slot-card .team-swatch { width: 4px; height: 28px; border-radius: 2px; flex-shrink: 0; }
  .slot-card .team-name { font-weight: 600; font-size: 15px; }
  .slot-card .team-seed { color: var(--text-mute); font-size: 11px; font-weight: 500; margin-left: 4px; }
  .slot-card .team-prob { font-family: "SF Mono", Menlo, monospace; font-size: 14px; font-weight: 600; color: var(--text); flex-shrink: 0; }
  .slot-card .team-row.winner .team-name { color: #fff; }
  .slot-card .team-row.winner .team-prob { color: var(--fav); }
  .slot-card .team-row.loser .team-name { color: var(--text-dim); }
  .slot-card .team-row.loser .team-prob { color: var(--text-mute); }
  .slot-card .meta-row { color: var(--text-mute); font-size: 11px; margin-top: 8px; padding-top: 6px; border-top: 1px dashed var(--border); display: flex; justify-content: space-between; }

  .slot-card select { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border-strong); border-radius: 4px; padding: 3px 6px; font-size: 12px; font-family: inherit; min-width: 80px; min-height: 28px; cursor: pointer; }
  .slot-card select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .slot-card .selector-label { font-size: 10px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-right: 6px; }

  /* Confidence tiers — left border stripe */
  .slot-card.conf-high  { border-left: 4px solid var(--green); padding-left: 10px; }
  .slot-card.conf-med   { border-left: 4px solid var(--yellow); padding-left: 10px; }
  .slot-card.conf-low   { border-left: 4px solid var(--text-mute); padding-left: 10px; }

  /* === Series detail view === */
  .detail-empty { color: var(--text-mute); font-style: italic; padding: 40px 0; text-align: center; }
  .detail-header { margin-bottom: 20px; }
  .detail-header h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .detail-header .sub { color: var(--text-dim); font-size: 13px; }

  .detail-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 14px; }
  .detail-row h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 12px; }

  .win-bars { display: flex; flex-direction: column; gap: 8px; }
  .win-bar { display: grid; grid-template-columns: 120px 1fr 60px; gap: 12px; align-items: center; }
  .win-bar .team-label { font-weight: 600; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .win-bar .bar-track { height: 14px; background: var(--bg-elev); border-radius: 3px; overflow: hidden; }
  .win-bar .bar-fill { height: 100%; transition: width 0.2s; }
  .win-bar .pct { font-family: "SF Mono", Menlo, monospace; font-size: 13px; text-align: right; }

  .length-rows { display: flex; flex-direction: column; gap: 6px; }
  .length-row { display: grid; grid-template-columns: 60px 1fr 60px; gap: 12px; align-items: center; }
  .length-row .label { color: var(--text-dim); font-size: 12px; }
  .length-row .bar-track { height: 10px; background: var(--bg-elev); border-radius: 2px; overflow: hidden; }
  .length-row .bar-fill { height: 100%; background: var(--accent); transition: width 0.2s; }
  .length-row .pct { font-family: "SF Mono", Menlo, monospace; font-size: 12px; color: var(--text-dim); text-align: right; }

  table.per-game { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.per-game th { text-align: left; color: var(--text-mute); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  table.per-game td { padding: 8px; border-bottom: 1px solid var(--border); font-family: "SF Mono", Menlo, monospace; }
  table.per-game tr:last-child td { border-bottom: none; }
  table.per-game .home-higher { color: var(--fav); }
  table.per-game .home-lower { color: var(--dog); }

  table.joint { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
  table.joint th, table.joint td { padding: 6px 8px; text-align: center; border-bottom: 1px solid var(--border); font-family: "SF Mono", Menlo, monospace; }
  table.joint th:first-child, table.joint td:first-child { text-align: left; font-family: inherit; font-weight: 600; }

  /* === Backtest view === */
  .verdict { display: flex; align-items: center; gap: 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 16px; }
  .verdict .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .verdict.green .dot { background: var(--green); box-shadow: 0 0 10px rgba(56,193,114,0.5); }
  .verdict.yellow .dot { background: var(--yellow); box-shadow: 0 0 10px rgba(242,201,76,0.5); }
  .verdict.red .dot { background: var(--red); box-shadow: 0 0 10px rgba(231,76,60,0.5); }
  .verdict .text h3 { font-size: 15px; margin-bottom: 2px; }
  .verdict .text p { font-size: 12px; color: var(--text-dim); }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .metric-card .label { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .metric-card .value { font-size: 24px; font-weight: 600; font-family: "SF Mono", Menlo, monospace; }
  .metric-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .metric-card.pos .value { color: var(--green); }
  .metric-card.neg .value { color: var(--red); }

  .season-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .season-table th, .season-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
  .season-table th { color: var(--text-mute); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.06em; }
  .season-table td.num { font-family: "SF Mono", Menlo, monospace; }

  /* === Model info view === */
  ul.limitations { padding-left: 20px; color: var(--text-dim); font-size: 13px; line-height: 1.6; }
  ul.limitations li { margin-bottom: 6px; }

  .mi-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .mi-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 12px; }
  .mi-version-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 0; }
  .mi-ver-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .mi-ver-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-mute); margin-bottom: 4px; }
  .mi-ver-val { font-size: 15px; font-weight: 600; font-family: "SF Mono", Menlo, monospace; }

  .fi-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .fi-bar-row:last-child { margin-bottom: 0; }
  .fi-rank { width: 20px; text-align: right; font-size: 11px; color: var(--text-mute); flex-shrink: 0; }
  .fi-name { width: 180px; font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  @media (max-width: 480px) { .fi-name { width: 120px; } }
  .fi-track { flex: 1; height: 10px; background: var(--bg-elev); border-radius: 3px; overflow: hidden; min-width: 60px; }
  .fi-fill  { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .fi-fill.pos { background: var(--fav); }
  .fi-fill.neg { background: var(--dog); }
  .fi-coef  { width: 50px; text-align: right; font-size: 11px; font-family: "SF Mono", Menlo, monospace; color: var(--text-dim); flex-shrink: 0; }

  .override-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .override-item:last-child { border-bottom: none; }
  .override-none { font-size: 13px; color: var(--text-mute); font-style: italic; }
  .oi-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .oi-dot.inj { background: var(--yellow); }
  .oi-dot.ser { background: var(--accent); }

  .local-panel { background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 8px; padding: 14px 16px; }
  .local-note  { font-size: 12px; color: var(--text-mute); margin-bottom: 12px; }
  .local-action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .local-btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--bg-card); color: var(--text); font-size: 13px; font-family: inherit; cursor: pointer; transition: background 0.15s, border-color 0.15s; min-height: 36px; }
  .local-btn:hover { background: var(--bg-elev); border-color: var(--accent); color: var(--accent); }
  .local-btn.primary { background: rgba(74,144,226,0.15); border-color: var(--accent); color: var(--accent); }
  .local-btn.primary:hover { background: rgba(74,144,226,0.25); }
  .local-status { font-size: 12px; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); margin-top: 8px; display: none; }
  .local-status.ok   { color: var(--green); border-color: rgba(56,193,114,0.3); background: rgba(56,193,114,0.07); display: block; }
  .local-status.warn { color: var(--yellow); border-color: rgba(242,201,76,0.3); background: rgba(242,201,76,0.07); display: block; }
  .local-status.err  { color: var(--red); border-color: rgba(231,76,60,0.3); background: rgba(231,76,60,0.07); display: block; }

  .inj-form { margin-top: 12px; }
  .inj-form-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 8px; }
  .inj-form-row label { display: block; font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .inj-form-row input, .inj-form-row select { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border-strong); border-radius: 5px; padding: 6px 10px; font-size: 13px; font-family: inherit; min-height: 36px; }
  .inj-form-row input { width: 180px; }
  .inj-form-row select { min-width: 140px; }
  .inj-form-row input:focus, .inj-form-row select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .pending-list { margin: 10px 0; }
  .pending-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 10px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 6px; font-size: 12px; }
  .pending-item .pi-info { flex: 1; }
  .pending-item .pi-remove { background: none; border: none; color: var(--text-mute); cursor: pointer; font-size: 14px; padding: 0 4px; line-height: 1; }
  .pending-item .pi-remove:hover { color: var(--red); }
  .local-offline { font-size: 13px; color: var(--text-mute); font-style: italic; padding: 12px 0; }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    main { padding: 10px; }
    header { padding: 10px 12px 6px; }
    header h1 { font-size: 15px; }
    nav.tabs button { font-size: 13px; padding: 10px 10px; min-height: 44px; }
    .slot-card { padding: 10px 12px; }
    .slot-card .team-name { font-size: 14px; }
    .slot-card .team-prob { font-size: 13px; }
    .slot-card .team-row { min-height: 40px; }
    .detail-header h2 { font-size: 17px; }
    .win-bar { grid-template-columns: 90px 1fr 50px; gap: 8px; }
    .length-row { grid-template-columns: 50px 1fr 50px; gap: 8px; }
    table.per-game { font-size: 11px; }
    table.per-game td, table.per-game th { padding: 5px 4px; }
    .metric-card .value { font-size: 20px; }
    .today-card { padding: 12px 14px; }
    .today-grid { gap: 10px 14px; }
    .game-base-pred { gap: 16px; }
    .cmp-table th, .cmp-table td { padding: 6px 5px; font-size: 12px; }
    .stat-table th, .stat-table td { padding: 6px 5px; font-size: 11px; }
  }

  /* === Today view === */
  .today-empty { color: var(--text-mute); font-style: italic; padding: 60px 20px; text-align: center; font-size: 15px; }

  .staleness-bar { margin-bottom: 16px; padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 6px; }
  .staleness-bar.stale { border-color: rgba(231,76,60,0.4); background: rgba(231,76,60,0.07); }
  .staleness-date { font-size: 15px; font-weight: 600; color: var(--text); }
  .staleness-age { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .staleness-age.stale-warn { color: var(--red); font-weight: 600; }

  .today-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .today-card:hover { border-color: var(--border-strong); }
  .today-card:active { transform: scale(0.995); }
  .today-card.band-green  { border-left: 4px solid var(--green);  padding-left: 12px; }
  .today-card.band-yellow { border-left: 4px solid var(--yellow); padding-left: 12px; }
  .today-card.band-red    { border-left: 4px solid var(--red);    padding-left: 12px; }

  .today-teams { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .today-ctx   { font-size: 11px; color: var(--text-mute); margin-bottom: 10px; }

  .today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; margin-bottom: 10px; }
  @media (max-width: 480px) { .today-grid { grid-template-columns: 1fr; gap: 8px; } }
  .tg-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-mute); margin-bottom: 3px; }
  .tg-val   { font-family: "SF Mono", Menlo, monospace; font-size: 13px; }
  .tg-winner { font-size: 14px; font-weight: 700; color: var(--fav); font-family: "SF Mono", Menlo, monospace; }
  .tg-adj    { color: var(--yellow); }
  .tg-flip   { color: var(--red); cursor: help; margin-left: 4px; font-style: normal; }
  .tg-muted  { color: var(--text-mute); }

  .today-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding-top: 8px; border-top: 1px dashed var(--border); font-size: 11px; }
  .edge-badge   { padding: 2px 8px; border-radius: 10px; background: rgba(74,144,226,0.15); color: var(--accent); border: 1px solid rgba(74,144,226,0.3); font-weight: 600; }
  .inj-flag     { color: var(--yellow); font-weight: 600; }
  .nav-hint     { color: var(--text-mute); margin-left: auto; }

  /* === Game detail view === */
  .game-stub { color: var(--text-mute); padding: 60px 20px; text-align: center; font-size: 15px; }
  .back-btn { display: inline-flex; align-items: center; gap: 4px; color: var(--text-mute); font-size: 12px; background: none; border: none; cursor: pointer; font-family: inherit; padding: 0 0 14px; }
  .back-btn:hover { color: var(--text); }
  .cmp-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .cmp-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 12px; }
  .game-matchup { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .game-series-ctx { font-size: 12px; color: var(--text-mute); margin-bottom: 12px; }
  .game-base-pred { display: flex; gap: 24px; flex-wrap: wrap; padding-top: 12px; border-top: 1px dashed var(--border); margin-top: 12px; }
  .game-pred-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-mute); margin-bottom: 3px; }
  .game-pred-val { font-family: "SF Mono", Menlo, monospace; font-size: 15px; font-weight: 600; color: var(--fav); }
  .cmp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .cmp-table th { text-align: left; color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .cmp-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); font-family: "SF Mono", Menlo, monospace; }
  .cmp-table td:first-child { font-family: inherit; color: var(--text-dim); font-size: 12px; }
  .cmp-table tr:last-child td { border-bottom: none; }
  .cmp-table .model-col { color: var(--fav); font-weight: 600; }
  .cmp-table .market-col { color: var(--text-dim); }
  .cmp-table .delta-pos { color: var(--green); }
  .cmp-table .delta-neg { color: var(--red); }
  .adj-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 480px) { .adj-panel { grid-template-columns: 1fr; } }
  .adj-col-head { font-size: 11px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .inj-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .inj-item:last-child { border-bottom: none; }
  .inj-item .inj-icon { flex-shrink: 0; }
  .stat-legend { display: flex; gap: 6px; font-size: 11px; color: var(--text-dim); margin-bottom: 10px; flex-wrap: wrap; }
  .stat-legend span { display: flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 10px; background: var(--bg-elev); border: 1px solid var(--border); white-space: nowrap; }
  .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .legend-green  { background: var(--green); }
  .legend-yellow { background: var(--yellow); }
  .legend-red    { background: var(--red); }

  /* === Team logos === */
  img.tl { border-radius: 50%; object-fit: contain; background: var(--bg-elev); flex-shrink: 0; vertical-align: middle; display: inline-block; }
  img.tl-sm { width: 20px; height: 20px; }
  img.tl-md { width: 28px; height: 28px; }
  img.tl-lg { width: 40px; height: 40px; }
  @media (max-width: 480px) {
    img.tl-sm { width: 18px; height: 18px; }
    img.tl-md { width: 24px; height: 24px; }
    img.tl-lg { width: 34px; height: 34px; }
  }
  /* Bracket row — logo replaces swatch */
  .slot-card .team-logo-wrap { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-elev); }
  .slot-card .team-logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .stat-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .stat-table th { text-align: left; color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .stat-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); font-family: "SF Mono", Menlo, monospace; }
  .stat-table td:first-child { font-family: inherit; font-size: 12px; color: var(--text-dim); }
  .stat-table tr:last-child td { border-bottom: none; }
  .cell-green  { color: var(--green);  font-weight: 600; }
  .cell-yellow { color: var(--yellow); font-weight: 600; }
  .cell-red    { color: var(--red); }
  .cell-dim    { color: var(--text-mute); }

  /* === Results view === */
  .results-filter { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }

  .results-filter select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .metric-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }

  .metric-box .mb-value { font-size: 22px; font-weight: 600; font-family: "SF Mono", Menlo, monospace; }
  .metric-box .mb-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .metric-box.pos .mb-value { color: var(--green); }
  .metric-box.neg .mb-value { color: var(--red); }
  .splits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  @media (max-width: 600px) { .splits-grid { grid-template-columns: 1fr; } }
  .split-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
  .split-box h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-mute); margin-bottom: 8px; }
  .split-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 4px 0; }
  .split-row .sr-label { color: var(--text-dim); }
  .split-row .sr-val { font-family: "SF Mono", Menlo, monospace; font-weight: 600; }
  .results-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; overflow-x: auto; }
  .results-section h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 12px; }
  .results-empty { color: var(--text-mute); font-size: 13px; font-style: italic; }
  .results-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 400px; }
  .results-table th { text-align: left; color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; padding: 5px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .results-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); }
  .results-table tr:last-child td { border-bottom: none; }
  .results-table .mono { font-family: "SF Mono", Menlo, monospace; }
  .ats-cover { color: var(--green); font-weight: 600; }
  .ats-miss  { color: var(--red); }
  .ats-push, .ou-push { color: var(--text-mute); }
  .ou-over   { color: var(--yellow); font-weight: 600; }

  .res-chart-wrap { margin: 10px 0; }
  .res-chart-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
  .res-correction-note { font-size: 11px; color: var(--yellow); margin-top: 4px; }
  .res-chart-item { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .res-chart-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .lm-game { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .lm-game:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .lm-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .lm-table { border-collapse: collapse; font-size: 11px; }
  .lm-table th, .lm-table td { padding: 4px 10px; text-align: right; border-bottom: 1px solid var(--border); font-family: "SF Mono", Menlo, monospace; }
  .lm-table th:first-child, .lm-table td:first-child { text-align: left; font-family: inherit; color: var(--text-mute); }
  .lm-table .model-row td { color: var(--fav); font-weight: 600; }
  .lm-table tr:last-child td { border-bottom: none; }
  .lm-note { font-size: 11px; color: var(--text-mute); margin-top: 10px; line-height: 1.5; }

  /* Loading / error states */
  @keyframes spin { to { transform: rotate(360deg); } }
  #app-loading { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  #app-loading .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  #app-error { text-align: center; padding: 80px 20px; color: var(--red); font-size: 15px; }
</style>

<body>
<header>
  <h1>NBA Playoffs 2026 — Predictions</h1>
  <div class="meta" id="header-meta"></div>
</header>

<nav class="tabs">
  <button data-tab="today" class="active">Today</button>
  <button data-tab="bracket">Bracket</button>
  <button data-tab="game">Game Detail</button>
  <button data-tab="results">Results</button>
  <button data-tab="detail">Series Detail</button>

</nav>

<main>
  <div id="app-loading"><div class="spinner"></div><p>Loading predictions...</p></div>
  <div id="app-error" style="display:none">Data unavailable — try refreshing.</div>
  <div id="app-content" style="display:none">
    <section id="today-view" class="view active"></section>
    <section id="bracket-view" class="view"></section>
    <section id="game-view" class="view"></section>
    <section id="results-view" class="view"></section>
    <section id="detail-view" class="view"></section>
    <section id="backtest-view" class="view"></section>
    <section id="model-view" class="view"></section>
  </div>
</main>

<script>
"use strict";
let PREDICTIONS = null;

// ========== NBA Team Colors ==========
// Hardcoded per decision #4. Primary is the team's dominant brand color.
const TEAM_COLORS = {
  ATL: { primary: "#E03A3E", secondary: "#C1D32F" },
  BOS: { primary: "#007A33", secondary: "#BA9653" },
  BKN: { primary: "#000000", secondary: "#FFFFFF" },
  CHA: { primary: "#1D1160", secondary: "#00788C" },
  CHI: { primary: "#CE1141", secondary: "#000000" },
  CLE: { primary: "#860038", secondary: "#FDBB30" },
  DAL: { primary: "#00538C", secondary: "#002B5E" },
  DEN: { primary: "#0E2240", secondary: "#FEC524" },
  DET: { primary: "#C8102E", secondary: "#1D42BA" },
  GSW: { primary: "#1D428A", secondary: "#FFC72C" },
  HOU: { primary: "#CE1141", secondary: "#000000" },
  IND: { primary: "#002D62", secondary: "#FDBB30" },
  LAC: { primary: "#C8102E", secondary: "#1D428A" },
  LAL: { primary: "#552583", secondary: "#FDB927" },
  MEM: { primary: "#5D76A9", secondary: "#12173F" },
  MIA: { primary: "#98002E", secondary: "#F9A01B" },
  MIL: { primary: "#00471B", secondary: "#EEE1C6" },
  MIN: { primary: "#0C2340", secondary: "#236192" },
  NOP: { primary: "#0C2340", secondary: "#C8102E" },
  NYK: { primary: "#006BB6", secondary: "#F58426" },
  OKC: { primary: "#007AC1", secondary: "#EF3B24" },
  ORL: { primary: "#0077C0", secondary: "#C4CED4" },
  PHI: { primary: "#006BB6", secondary: "#ED174C" },
  PHX: { primary: "#1D1160", secondary: "#E56020" },
  POR: { primary: "#E03A3E", secondary: "#000000" },
  SAC: { primary: "#5A2D81", secondary: "#63727A" },
  SAS: { primary: "#C4CED4", secondary: "#000000" },
  TOR: { primary: "#CE1141", secondary: "#000000" },
  UTA: { primary: "#002B5C", secondary: "#00471B" },
  WAS: { primary: "#002B5C", secondary: "#E31837" },
};
function teamColor(abbr, which = "primary") {
  return (TEAM_COLORS[abbr] || { primary: "#888", secondary: "#555" })[which];
}

// ESPN CDN logo URLs — abbreviation overrides for non-standard ESPN slugs.
const _ESPN_CDN = "https://a.espncdn.com/i/teamlogos/nba/500/";
const TEAM_LOGO_URLS = (() => {
  const m = {};
  for (const abbr of Object.keys(TEAM_COLORS)) m[abbr] = _ESPN_CDN + abbr.toLowerCase() + ".png";
  Object.assign(m, {
    GSW: _ESPN_CDN + "gs.png",
    NOP: _ESPN_CDN + "no.png",
    NYK: _ESPN_CDN + "ny.png",
    SAS: _ESPN_CDN + "sa.png",
    UTA: _ESPN_CDN + "utah.png",
    WAS: _ESPN_CDN + "wsh.png",
  });
  return m;
})();

function teamLogoEl(abbr, sizeClass) {
  // sizeClass: "tl-sm" | "tl-md" | "tl-lg"
  const img = document.createElement("img");
  img.src  = TEAM_LOGO_URLS[abbr] || "";
  img.alt  = abbr;
  img.className = "tl " + (sizeClass || "tl-md");
  img.onerror = function() {
    const px = this.className.includes("tl-sm") ? 20 : this.className.includes("tl-lg") ? 40 : 28;
    const fb = document.createElement("span");
    fb.style.cssText = "display:inline-block;width:" + px + "px;height:" + px + "px;border-radius:50%;background:" + teamColor(abbr) + ";flex-shrink:0;vertical-align:middle;";
    if (this.parentNode) this.parentNode.replaceChild(fb, this);
  };
  return img;
}

// ========== Stat table config (tune thresholds here post-launch) ==========
// Each row: label, homeKey/awayKey into team_stats, better=higher|lower|neutral,
// fmt=pct|r2|r1|int, th={g,y} = green/yellow threshold on the diff.
const STAT_ROWS = [
  { label: "Net Rating",             homeKey: "net_rating",         awayKey: "net_rating",         better: "higher",  fmt: "r2",  th: { g: 4.0,  y: 1.0  } },
  { label: "Offensive Rating",       homeKey: "off_rating",         awayKey: "off_rating",         better: "higher",  fmt: "r2",  th: { g: 4.0,  y: 2.0  } },
  { label: "Defensive Rating",       homeKey: "def_rating",         awayKey: "def_rating",         better: "lower",   fmt: "r2",  th: { g: 4.0,  y: 2.0  } },
  { label: "eFG% (Off)",             homeKey: "efg_pct",            awayKey: "efg_pct",            better: "higher",  fmt: "pct", th: { g: 0.03, y: 0.01 } },
  { label: "eFG% (Def)",             homeKey: "opp_efg_pct",        awayKey: "opp_efg_pct",        better: "lower",   fmt: "pct", th: { g: 0.03, y: 0.01 } },
  { label: "eFG% Differential",      homeKey: "_efg_diff",          awayKey: "_efg_diff",          better: "higher",  fmt: "pct", th: { g: 0.03, y: 0.01 } },
  { label: "Pace",                   homeKey: "pace",               awayKey: "pace",               better: "neutral", fmt: "r1",  th: { g: 3.0,  y: 1.0  } },
  { label: "Points in Paint",        homeKey: "pts_paint",          awayKey: "pts_paint",          better: "higher",  fmt: "r1",  th: { g: 6.0,  y: 3.0  } },
  { label: "2nd Chance Pts Allowed", homeKey: "opp_pts_2nd_chance", awayKey: "opp_pts_2nd_chance", better: "lower",   fmt: "r1",  th: { g: 3.0,  y: 1.5  } },
  { label: "Clutch Net Rating",      homeKey: "clutch_plus_minus",  awayKey: "clutch_plus_minus",  better: "higher",  fmt: "r2",  th: { g: 2.0,  y: 0.5  } },
  { label: "Home/Away Win %",        homeKey: "home_w_pct",         awayKey: "away_w_pct",         better: "higher",  fmt: "pct", th: { g: 0.10, y: 0.04 } },
  { label: "Rest Days",              homeKey: "rest_days",          awayKey: "rest_days",          better: "higher",  fmt: "int", th: { g: 2,    y: 1    } },
  { label: "Season Win %",           homeKey: "w_pct",              awayKey: "w_pct",              better: "higher",  fmt: "pct", th: { g: 0.10, y: 0.04 } },
];

// ========== State ==========
const state = {
  picks: {},               // slot_id -> {a: abbr, b: abbr}   (user's current selections per slot)
  detailSlot: null,        // slot_id currently displayed in detail view
  todayGame: null,         // game object from today_games, set when user taps a game card
  resultsVersion: "all",   // model version filter for Results tab
};

// ========== Data helpers ==========
function teamName(abbr) {
  const t = PREDICTIONS.teams[abbr];
  return t ? t.team_name : abbr;
}
function teamNick(abbr) {
  const t = PREDICTIONS.teams[abbr];
  return t ? t.nickname : abbr;
}
function seriesResult(abbrA, abbrB) {
  const k1 = abbrA + "|" + abbrB;
  const k2 = abbrB + "|" + abbrA;
  return PREDICTIONS.series_results[k1] || PREDICTIONS.series_results[k2] || null;
}
function winnerOf(abbrA, abbrB) {
  const sr = seriesResult(abbrA, abbrB);
  if (!sr) return abbrA;
  return sr.p_higher_wins_series >= 0.5 ? sr.higher_abbr : sr.lower_abbr;
}
function slotById(id) { return PREDICTIONS.bracket_slots.find(s => s.id === id); }
function fmtPct(x) { return (x * 100).toFixed(1) + "%"; }
function fmtSpread(x) { return (x >= 0 ? "+" : "") + x.toFixed(1); }
function fmtStat(val, fmt) {
  if (val == null) return "—";
  if (fmt === "pct") return (val * 100).toFixed(1) + "%";
  if (fmt === "r2")  return (val >= 0 ? "+" : "") + val.toFixed(2);
  if (fmt === "r1")  return val.toFixed(1);
  if (fmt === "int") return String(Math.round(val));
  return String(val);
}
function statCells(hVal, aVal, better, th) {
  if (hVal == null || aVal == null || better === "neutral") return { hClass: "", aClass: "" };
  const diff = better === "lower" ? aVal - hVal : hVal - aVal;
  const abs = Math.abs(diff);
  if (abs >= th.g) return diff > 0 ? { hClass: "cell-green", aClass: "cell-red"  }
                                    : { hClass: "cell-red",   aClass: "cell-green" };
  if (abs >= th.y) return diff > 0 ? { hClass: "cell-yellow", aClass: "cell-dim"  }
                                    : { hClass: "cell-dim",    aClass: "cell-yellow" };
  return { hClass: "", aClass: "" };
}

// ========== Tab navigation ==========
document.querySelectorAll("nav.tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b === btn));
    document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === tab + "-view"));
    window.scrollTo(0, 0);
  });
});

// ========== Bracket view ==========
function confidenceClass(p) {
  const edge = Math.abs(p - 0.5);
  if (edge > 0.25) return "conf-high";  // > 75% / < 25%
  if (edge > 0.10) return "conf-med";   // 60-75%
  return "conf-low";                    // near coin flip
}

function renderSlotCard(slot) {
  const pick = state.picks[slot.id];
  const sr = seriesResult(pick.a, pick.b);

  const card = document.createElement("div");
  card.className = "slot-card";
  card.dataset.slotId = slot.id;

  const probHigher = sr ? sr.p_higher_wins_series : 0.5;
  card.classList.add(confidenceClass(probHigher));

  // Team color top accent for winner identity
  const projectedWinner = sr ? (probHigher >= 0.5 ? sr.higher_abbr : sr.lower_abbr) : pick.a;
  card.style.borderTop = "2px solid " + teamColor(projectedWinner);

  // Header: slot id label
  const idRow = document.createElement("div");
  idRow.className = "slot-id";
  idRow.textContent = slot.id.replace(/-/g, " · ");
  card.appendChild(idRow);

  const teamAbbrs = sr ? [sr.higher_abbr, sr.lower_abbr] : [pick.a, pick.b];
  const winnerAbbr = sr ? winnerOf(pick.a, pick.b) : pick.a;

  // For each side (higher seed first): team name, selector (if R2+), prob
  const sidesInfo = [
    { abbr: teamAbbrs[0], prob: sr ? sr.p_higher_wins_series : 0.5,
      slotSide: slot.default_a === pick.a ? "a" : (slot.default_b === pick.a ? "b" : null),
      isHigher: true },
    { abbr: teamAbbrs[1], prob: sr ? sr.p_lower_wins_series : 0.5,
      slotSide: slot.default_a === pick.b ? "a" : (slot.default_b === pick.b ? "b" : null),
      isHigher: false },
  ];

  for (const info of sidesInfo) {
    const row = document.createElement("div");
    row.className = "team-row " + (info.abbr === winnerAbbr ? "winner" : "loser");

    const left = document.createElement("div");
    left.className = "team-left";

    // Logo replaces swatch
    const logoWrap = document.createElement("div");
    logoWrap.className = "team-logo-wrap";
    logoWrap.appendChild(teamLogoEl(info.abbr, "tl-sm"));
    left.appendChild(logoWrap);

    const name = document.createElement("span");
    name.className = "team-name";
    name.textContent = teamNick(info.abbr);
    left.appendChild(name);

    const seed = (sr ? (info.isHigher ? sr.higher_seed : sr.lower_seed) : null);
    if (seed) {
      const seedEl = document.createElement("span");
      seedEl.className = "team-seed";
      seedEl.textContent = "#" + seed;
      left.appendChild(seedEl);
    }

    row.appendChild(left);

    const prob = document.createElement("span");
    prob.className = "team-prob";
    prob.textContent = fmtPct(info.prob);
    row.appendChild(prob);

    card.appendChild(row);
  }

  // Selectors for R2+ slots: one <select> per side, showing the candidates from its feeder.
  if (slot.round > 1) {
    const selRow = document.createElement("div");
    selRow.className = "meta-row";
    selRow.style.flexDirection = "column";
    selRow.style.gap = "6px";
    selRow.style.alignItems = "stretch";

    for (const side of ["a", "b"]) {
      const candidates = slot["candidates_" + side];
      const feederLabel = slot["label_" + side];
      const sideRow = document.createElement("div");
      sideRow.style.display = "flex";
      sideRow.style.alignItems = "center";
      sideRow.style.justifyContent = "space-between";
      sideRow.style.gap = "8px";

      const label = document.createElement("span");
      label.className = "selector-label";
      label.textContent = feederLabel + ":";
      sideRow.appendChild(label);

      const select = document.createElement("select");
      for (const cand of candidates) {
        const opt = document.createElement("option");
        opt.value = cand;
        opt.textContent = teamNick(cand);
        if (cand === pick[side]) opt.selected = true;
        select.appendChild(opt);
      }
      select.addEventListener("click", e => e.stopPropagation());
      select.addEventListener("change", e => {
        e.stopPropagation();
        state.picks[slot.id][side] = e.target.value;
        softCascade(slot.id);
        renderBracket();
      });
      sideRow.appendChild(select);
      selRow.appendChild(sideRow);
    }
    card.appendChild(selRow);
  }

  // Expected series length footer
  if (sr) {
    const meta = document.createElement("div");
    meta.className = "meta-row";
    meta.innerHTML =
      '<span>Exp. length: ' + sr.expected_length.toFixed(1) + ' games</span>' +
      '<span style="color: var(--text-mute);">tap for detail →</span>';
    card.appendChild(meta);
  }

  card.addEventListener("click", () => {
    state.detailSlot = slot.id;
    renderDetail();
    document.querySelector('nav.tabs button[data-tab="detail"]').click();
  });

  return card;
}

// Soft cascade: when a slot changes, update the defaults of downstream slots
// that still match the old defaults (i.e., haven't been manually overridden).
function softCascade(changedSlotId) {
  const newWinner = winnerOf(state.picks[changedSlotId].a, state.picks[changedSlotId].b);
  const cascadeOrder = [2, 3, 4];  // R2, CF, Finals

  for (const round of cascadeOrder) {
    const slots = PREDICTIONS.bracket_slots.filter(s => s.round === round);
    for (const slot of slots) {
      for (const side of ["a", "b"]) {
        if (slot["feeder_" + side + "_id"] === changedSlotId) {
          const defaultForSide = slot["default_" + side];
          const currentPick = state.picks[slot.id][side];
          // Only override if the current pick was still the stale chalk winner
          // AND it's no longer reachable given the upstream change.
          if (currentPick !== newWinner) {
            state.picks[slot.id][side] = newWinner;
          }
        }
      }
    }
    // Propagate further.
    // Re-compute chain by looking at newWinners computed this round too:
    // we approximate by re-running for each slot in the round.
  }
  // A conservative approach: full re-propagate from R2 downward.
  fullChalkResync();
}

function fullChalkResync() {
  // Re-resolve each R2+ slot's downstream feeders by computing their current
  // picks' winner and checking if downstream feeders still match a reachable
  // candidate. This keeps the cascade consistent without overriding picks the
  // user explicitly set (we only overwrite picks that are no longer feasible,
  // which is rare — only when a feeder's winner changes).
  for (const round of [2, 3, 4]) {
    const slots = PREDICTIONS.bracket_slots.filter(s => s.round === round);
    for (const slot of slots) {
      for (const side of ["a", "b"]) {
        const feederId = slot["feeder_" + side + "_id"];
        if (!feederId) continue;
        const feederWinner = winnerOf(state.picks[feederId].a, state.picks[feederId].b);
        const candidates = slot["candidates_" + side];
        if (!candidates.includes(state.picks[slot.id][side])) {
          state.picks[slot.id][side] = feederWinner;
        }
      }
    }
  }
}

function renderBracket() {
  const root = document.getElementById("bracket-view");
  root.innerHTML = "";
  const roundNames = { 1: "Round 1", 2: "Conference Semifinals", 3: "Conference Finals", 4: "NBA Finals" };

  for (const round of [1, 2, 3, 4]) {
    const block = document.createElement("div");
    block.className = "round-block";
    const h2 = document.createElement("h2");
    h2.textContent = roundNames[round];
    block.appendChild(h2);

    if (round === 4) {
      const finalsSlot = PREDICTIONS.bracket_slots.find(s => s.round === 4);
      block.appendChild(renderSlotCard(finalsSlot));
    } else {
      const grid = document.createElement("div");
      grid.className = "conf-grid";
      for (const conf of ["East", "West"]) {
        const col = document.createElement("div");
        col.className = "conf-col";
        const h3 = document.createElement("h3");
        h3.textContent = conf;
        col.appendChild(h3);
        const slots = PREDICTIONS.bracket_slots.filter(s => s.round === round && s.conference === conf);
        for (const slot of slots) col.appendChild(renderSlotCard(slot));
        grid.appendChild(col);
      }
      block.appendChild(grid);
    }
    root.appendChild(block);
  }
}

// ========== Backtest view ==========
function renderBacktest() {
  const root = document.getElementById("backtest-view");
  root.innerHTML = "";
  const bt = PREDICTIONS.backtest;
  if (!bt) {
    root.innerHTML = '<div class="detail-empty">No backtest report available.</div>';
    return;
  }

  const c = bt.combined;
  const edge = c && c.higher_seed_baseline != null ? c.accuracy - c.higher_seed_baseline : null;
  let tier = "red", msg = "Model fails the gate vs higher-seed baseline.";
  if (edge != null) {
    if (edge > 0.05)      { tier = "green";  msg = "Model beats higher-seed baseline by " + (edge*100).toFixed(1) + " pp — use with informed confidence."; }
    else if (edge > 0.0)  { tier = "yellow"; msg = "Model beats higher-seed baseline but by less than 5 pp — thin edge."; }
  }

  const verdict = document.createElement("div");
  verdict.className = "verdict " + tier;
  verdict.innerHTML =
    '<div class="dot"></div>' +
    '<div class="text"><h3>Gate: ' + (bt.gate_pass ? 'PASS' : 'FAIL') + '</h3><p>' + msg + '</p></div>';
  root.appendChild(verdict);

  // Combined metrics grid
  if (c) {
    const grid = document.createElement("div");
    grid.className = "metric-grid";
    grid.innerHTML =
      '<div class="metric-card pos"><div class="label">Model Accuracy</div><div class="value">' + fmtPct(c.accuracy) + '</div><div class="sub">n=' + c.games + ' games</div></div>' +
      '<div class="metric-card"><div class="label">Higher-Seed Baseline</div><div class="value">' + fmtPct(c.higher_seed_baseline) + '</div><div class="sub">W%-proxy</div></div>' +
      '<div class="metric-card"><div class="label">Home-Wins Baseline</div><div class="value">' + fmtPct(c.home_wins_baseline) + '</div></div>' +
      '<div class="metric-card"><div class="label">Log Loss</div><div class="value">' + c.log_loss.toFixed(4) + '</div><div class="sub">random = 0.6931</div></div>' +
      '<div class="metric-card"><div class="label">Spread MAE</div><div class="value">' + c.spread_mae.toFixed(2) + '</div><div class="sub">points</div></div>' +
      '<div class="metric-card"><div class="label">Total MAE</div><div class="value">' + c.total_mae.toFixed(2) + '</div><div class="sub">points</div></div>';
    root.appendChild(grid);
  }

  // Per-season table
  if (bt.per_season && bt.per_season.length) {
    const wrap = document.createElement("div");
    wrap.className = "detail-row";
    wrap.innerHTML = "<h3>By Season</h3>";
    const tbl = document.createElement("table");
    tbl.className = "season-table";
    tbl.innerHTML =
      '<thead><tr><th>Season</th><th>Games</th><th>Accuracy</th><th>Higher-Seed</th><th>Log Loss</th><th>Spread MAE</th><th>Total MAE</th></tr></thead>';
    const tb = document.createElement("tbody");
    for (const s of bt.per_season) {
      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td>' + s.season + '</td>' +
        '<td class="num">' + s.games + '</td>' +
        '<td class="num">' + fmtPct(s.accuracy) + '</td>' +
        '<td class="num">' + fmtPct(s.higher_seed_baseline) + '</td>' +
        '<td class="num">' + s.log_loss.toFixed(4) + '</td>' +
        '<td class="num">' + s.spread_mae.toFixed(2) + '</td>' +
        '<td class="num">' + s.total_mae.toFixed(2) + '</td>';
      tb.appendChild(tr);
    }
    tbl.appendChild(tb);
    wrap.appendChild(tbl);
    root.appendChild(wrap);
  }

  const note = document.createElement("p");
  note.style.color = "var(--text-mute)";
  note.style.fontSize = "11px";
  note.style.marginTop = "10px";
  note.textContent =
    "Walk-forward backtest on two held-out playoff years. Higher-seed baseline uses an end-of-RS W%-proxy ranking (actual seedings aren't populated in the DB for v1). ~166 pooled games — error bars are wide.";
  root.appendChild(note);
}

const isLocalMode = (

const LOCAL_SERVER = "http://localhost:5001";

// ========== Model info view ==========
function renderModelInfo() {
  const root = document.getElementById("model-view");
  root.innerHTML = "";
  const mm = PREDICTIONS.model_metadata || {};
  const mi = PREDICTIONS.model_info || {};
  const ao = PREDICTIONS.active_overrides || { injuries: [], series_corrections: [] };

  // ── Section 1: Version cards ─────────────────────────────────────────────
  const verSec = document.createElement("div");
  verSec.className = "mi-section";
  verSec.innerHTML = '<h3>Model Version</h3>';
  const verGrid = document.createElement("div");
  verGrid.className = "mi-version-grid";

  const tr = mm.training_rows || {};
  const trainTotal = tr.total || (mi.training_rows) || "—";
  const retrainDate = mm.retrain_date || (mi.last_trained ? mi.last_trained.slice(0,10) : "—");
  const seasons = (mm.training_seasons || []).join(", ") || "—";
  const verCards = [
    { label: "Version", val: mm.version || "v2.0" },
    { label: "Last Retrained", val: retrainDate },
    { label: "Training Rows", val: typeof trainTotal === "number" ? trainTotal.toLocaleString() : trainTotal },
    { label: "Seasons", val: seasons },
  ];
  for (const c of verCards) {
    verGrid.innerHTML += '<div class="mi-ver-card"><div class="mi-ver-label">' + c.label + '</div><div class="mi-ver-val">' + c.val + '</div></div>';
  }
  verSec.appendChild(verGrid);

  // Training row breakdown
  if (tr.regular_season != null) {
    const breakdown = document.createElement("p");
    breakdown.style.cssText = "margin-top:10px;font-size:12px;color:var(--text-dim)";
    breakdown.textContent = "Breakdown — RS: " + tr.regular_season.toLocaleString() +
      " (×" + ((mm.training_weights || {}).regular_season || 1.0).toFixed(1) + ")" +
      " | Playoff historical: " + (tr.playoff_historical || 0).toLocaleString() +
      " (×" + ((mm.training_weights || {}).playoff_historical || 1.5).toFixed(1) + ")" +
      " | Current PO: " + (tr.playoff_current || 0).toLocaleString() +
      " (×" + ((mm.training_weights || {}).playoff_current || 2.0).toFixed(1) + ")";
    verSec.appendChild(breakdown);
  }
  root.appendChild(verSec);

  // ── Section 2: Feature importances ──────────────────────────────────────
  const fiSec = document.createElement("div");
  fiSec.className = "mi-section";
  fiSec.innerHTML = '<h3>Feature Importances (Top 10 by |Coefficient|)</h3>';

  const feats = mm.feature_importances_top10 || [];
  if (feats.length) {
    const maxAbs = Math.max(...feats.map(f => f.abs));
    for (let i = 0; i < feats.length; i++) {
      const f = feats[i];
      const pct = maxAbs > 0 ? (f.abs / maxAbs * 100).toFixed(1) : 0;
      const row = document.createElement("div");
      row.className = "fi-bar-row";
      const coefStr = (f.coefficient >= 0 ? "+" : "") + f.coefficient.toFixed(3);
      row.innerHTML =
        '<span class="fi-rank">' + (i + 1) + '</span>' +
        '<span class="fi-name" title="' + f.feature + '">' + f.feature + '</span>' +
        '<div class="fi-track"><div class="fi-fill ' + (f.coefficient >= 0 ? "pos" : "neg") + '" style="width:' + pct + '%"></div></div>' +
        '<span class="fi-coef">' + coefStr + '</span>';
      fiSec.appendChild(row);
    }
  } else {
    fiSec.innerHTML += '<p style="color:var(--text-mute);font-size:13px;font-style:italic">Feature importance data not available.</p>';
  }
  root.appendChild(fiSec);

  // ── Section 3: Active injury overrides ──────────────────────────────────
  const injSec = document.createElement("div");
  injSec.className = "mi-section";
  injSec.innerHTML = '<h3>Active Injury Overrides</h3>';
  const injuries = ao.injuries || [];
  if (injuries.length) {
    for (const inj of injuries) {
      const item = document.createElement("div");
      item.className = "override-item";
      item.innerHTML = '<div class="oi-dot inj"></div><span><strong>' + inj.team + '</strong> — ' +
        (inj.player || "player") + ' listed <strong>' + (inj.status || "Out") + '</strong></span>';
      injSec.appendChild(item);
    }
  } else {
    injSec.innerHTML += '<p class="override-none">No injury overrides active.</p>';
  }
  root.appendChild(injSec);

  // ── Section 4: Active series corrections ─────────────────────────────────
  const serSec = document.createElement("div");
  serSec.className = "mi-section";
  serSec.innerHTML = '<h3>Active Series Corrections</h3>';
  const seriesCorr = ao.series_corrections || [];
  if (seriesCorr.length) {
    for (const sc of seriesCorr) {
      const item = document.createElement("div");
      item.className = "override-item";
      const dir = sc.correction > 0 ? "Home +" : "Away +";
      item.innerHTML = '<div class="oi-dot ser"></div><span><strong>' + (sc.series_id || "—") + '</strong> — ' +
        dir + Math.abs(sc.correction).toFixed(1) + ' pts correction, ' +
        (sc.games_used || 0) + ' game(s) used</span>';
      serSec.appendChild(item);
    }
  } else {
    serSec.innerHTML += '<p class="override-none">No series corrections active.</p>';
  }
  root.appendChild(serSec);

  // ── Section 5: Market data source note ──────────────────────────────────
  const mktSec = document.createElement("div");
  mktSec.className = "mi-section";
  mktSec.innerHTML = '<h3>Market Data Source</h3>' +
    '<p style="font-size:13px;color:var(--text-dim);line-height:1.6">' +
    'Consensus line sourced from DraftKings, FanDuel, BetMGM, and Caesars via The Odds API free tier (median of posted lines). ' +
    'Spreads and totals only — moneylines not in scope for v2.0. ' +
    'Pinnacle (sharp line) not included. ' +
    'Lines are raw-posted (no vig removal). ' +
    '"Morning" = first pull of the day (~9 AM), "Evening" = single 7 PM pull (not per-game closing line).</p>';
  root.appendChild(mktSec);

  // ── Section 6: Known limitations ────────────────────────────────────────
  const limSec = document.createElement("div");
  limSec.className = "mi-section";
  limSec.innerHTML = '<h3>Known Limitations</h3>';
  const lims = (mm.limitations || mi.limitations || []);
  if (lims.length) {
    const ul = document.createElement("ul");
    ul.className = "limitations";
    for (const l of lims) {
      const li = document.createElement("li");
      li.textContent = l;
      ul.appendChild(li);
    }
    limSec.appendChild(ul);
  }
  root.appendChild(limSec);

  // ── Section 7: Local mode panel ─────────────────────────────────────────
  const localSec = document.createElement("div");
  localSec.className = "mi-section";
  localSec.innerHTML = '<h3>Local Controls</h3>';

  if (!isLocalMode) {
    const note = document.createElement("p");
    note.className = "local-offline";
    note.textContent = "Injury management and model refresh are available in local mode only. " +
      "Run the dashboard locally with scripts/server.py to use these features.";
    localSec.appendChild(note);
    root.appendChild(localSec);
    return;
  }

  buildLocalPanel(localSec, ao);
  root.appendChild(localSec);
}

function buildLocalPanel(root, ao) {
  const panel = document.createElement("div");
  panel.className = "local-panel";

  const note = document.createElement("p");
  note.className = "local-note";
  note.textContent = "Running locally. Injury saves trigger a pipeline refresh (~30–60 sec). Reload dashboard after refresh completes.";
  panel.appendChild(note);

  // Refresh Model button
  const actionRow = document.createElement("div");
  actionRow.className = "local-action-row";
  const refreshBtn = document.createElement("button");
  refreshBtn.className = "local-btn";
  refreshBtn.textContent = "Refresh Model (run_daily.py --skip-train)";
  const statusEl = document.createElement("div");
  statusEl.className = "local-status";
  statusEl.id = "local-status-msg";

  refreshBtn.addEventListener("click", () => {
    statusEl.className = "local-status warn";
    statusEl.textContent = "Triggering pipeline refresh...";
    fetch(LOCAL_SERVER + "/api/refresh", { method: "POST" })
      .then(r => r.json())
      .then(d => {
        statusEl.className = "local-status ok";
        statusEl.textContent = d.message || "Refresh triggered. Reload the dashboard in ~60 seconds.";
      })
      .catch(() => {
        statusEl.className = "local-status err";
        statusEl.textContent = "Could not connect to local server. Start it with: cd ~/nba-playoffs-model && uv run python scripts/server.py. Then reload and try again.";
      });
  });
  actionRow.appendChild(refreshBtn);
  panel.appendChild(actionRow);

  // Injury management
  const injHead = document.createElement("div");
  injHead.style.cssText = "font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-mute);margin:14px 0 10px";
  injHead.textContent = "Manage Injuries";
  panel.appendChild(injHead);

  const injNote = document.createElement("p");
  injNote.style.cssText = "font-size:12px;color:var(--text-mute);margin-bottom:10px";
  injNote.textContent = "Questionable = 0.5× net rating penalty. Out = full penalty (1.0×). Saved injuries trigger a pipeline refresh automatically.";
  panel.appendChild(injNote);

  // Mutable pending list (starts from active overrides)
  const pending = (ao.injuries || []).map(inj => ({ team: inj.team, player: inj.player || "", status: inj.status || "Out" }));

  const pendingListEl = document.createElement("div");
  pendingListEl.className = "pending-list";
  const renderPending = () => {
    pendingListEl.innerHTML = "";
    if (pending.length === 0) {
      pendingListEl.innerHTML = '<p style="font-size:12px;color:var(--text-mute);font-style:italic">No injuries queued.</p>';
      return;
    }
    for (let i = 0; i < pending.length; i++) {
      const p = pending[i];
      const item = document.createElement("div");
      item.className = "pending-item";
      item.innerHTML =
        '<span class="pi-info"><strong>' + p.team + '</strong> — ' + (p.player || "(player)") + ' — ' + p.status + '</span>' +
        '<button class="pi-remove" title="Remove">×</button>';
      item.querySelector(".pi-remove").addEventListener("click", () => {
        pending.splice(i, 1);
        renderPending();
      });
      pendingListEl.appendChild(item);
    }
  };
  renderPending();
  panel.appendChild(pendingListEl);

  // Add-injury form
  const form = document.createElement("div");
  form.className = "inj-form";
  const formRow = document.createElement("div");
  formRow.className = "inj-form-row";

  const teamSel = document.createElement("select");
  teamSel.innerHTML = '<option value="">Team</option>' +
    Object.keys(PREDICTIONS.teams).sort().map(t => '<option value="' + t + '">' + t + '</option>').join("");

  const playerInput = document.createElement("input");
  playerInput.type = "text";
  playerInput.placeholder = "Player name";

  const statusSel = document.createElement("select");
  statusSel.innerHTML = ['Questionable', 'Out'].map(s => '<option value="' + s + '">' + s + '</option>').join("");

  const addBtn = document.createElement("button");
  addBtn.className = "local-btn";
  addBtn.textContent = "+ Add";
  addBtn.addEventListener("click", () => {
    if (!teamSel.value) return;
    pending.push({ team: teamSel.value, player: playerInput.value.trim(), status: statusSel.value });
    playerInput.value = "";
    teamSel.value = "";
    renderPending();
  });

  const teamLabel = document.createElement("label");
  teamLabel.textContent = "Team";
  const tWrap = document.createElement("div");
  tWrap.innerHTML = '<label style="display:block;font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Team</label>';
  tWrap.appendChild(teamSel);

  const pWrap = document.createElement("div");
  pWrap.innerHTML = '<label style="display:block;font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Player</label>';
  pWrap.appendChild(playerInput);

  const sWrap = document.createElement("div");
  sWrap.innerHTML = '<label style="display:block;font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">Status</label>';
  sWrap.appendChild(statusSel);

  formRow.appendChild(tWrap);
  formRow.appendChild(pWrap);
  formRow.appendChild(sWrap);
  formRow.appendChild(addBtn);
  form.appendChild(formRow);
  panel.appendChild(form);

  // Save button
  const saveBtn = document.createElement("button");
  saveBtn.className = "local-btn primary";
  saveBtn.style.cssText = "margin-top:12px";
  saveBtn.textContent = "Save Injuries & Refresh Predictions";
  saveBtn.addEventListener("click", () => {
    statusEl.className = "local-status warn";
    statusEl.textContent = "Saving injury data and triggering refresh...";
    const today = new Date().toISOString().slice(0, 10);
    fetch(LOCAL_SERVER + "/api/injuries", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ injuries: pending, date: today }),
    })
      .then(r => r.json())
      .then(d => {
        if (d.error) {
          statusEl.className = "local-status warn";
          statusEl.textContent = d.error;
        } else {
          statusEl.className = "local-status ok";
          statusEl.textContent = d.message || "Injury data saved. Predictions refreshing — this may take 30–60 seconds. Reload the dashboard to see updated predictions.";
        }
      })
      .catch(() => {
        statusEl.className = "local-status err";
        statusEl.textContent = "Could not connect to local server. Start it with: cd ~/nba-playoffs-model && uv run python scripts/server.py. Then reload and try again.";
      });
  });
  panel.appendChild(saveBtn);
  panel.appendChild(statusEl);
  root.appendChild(panel);
}

// ========== Results view ==========
function computeMetrics(games) {
  let pickW = 0, pickL = 0, atsW = 0, atsL = 0, atsP = 0, ouO = 0, ouU = 0, ouP = 0;
  const clvVals = [];
  for (const g of games) {
    if (g.actual_spread != null && Math.abs(g.actual_spread) > 0.1) {
      if ((g.model_pick === "home") === (g.actual_spread > 0)) pickW++; else pickL++;
    }
    if (g.ats_result === "cover") atsW++;
    else if (g.ats_result === "miss") atsL++;
    else if (g.ats_result === "push") atsP++;
    if (g.ou_result === "over") ouO++;
    else if (g.ou_result === "under") ouU++;
    else if (g.ou_result === "push") ouP++;
    if (g.clv != null) clvVals.push(g.clv);
  }
  const clvMean = clvVals.length ? clvVals.reduce((a, b) => a + b, 0) / clvVals.length : null;
  return {
    pick: { w: pickW, l: pickL },
    ats:  { w: atsW, l: atsL, p: atsP },
    ou:   { o: ouO, u: ouU, p: ouP },
    clv:  { mean: clvMean, pos: clvVals.filter(c => c > 0).length, total: clvVals.length },
  };
}

function seriesPredWinner(seriesId) {
  const teamPart = (seriesId || "").split("_")[0];
  const sr = PREDICTIONS.series_results[teamPart] ||
             PREDICTIONS.series_results[teamPart.split("|").reverse().join("|")];
  if (!sr) return null;
  return sr.p_higher_wins_series >= 0.5 ? sr.higher_abbr : sr.lower_abbr;
}

function buildSeriesSummary(games) {
  const byId = {};
  for (const g of games) {
    const sid = g.series_id || "unknown";
    if (!byId[sid]) byId[sid] = { series_id: sid, games: [] };
    byId[sid].games.push(g);
  }
  return Object.values(byId).map(s => {
    const teams = s.series_id.split("_")[0].split("|");
    const teamWins = {};
    for (const t of teams) teamWins[t] = 0;
    let pickW = 0, pickL = 0, atsW = 0, atsL = 0, atsP = 0, ouO = 0, ouU = 0, ouP = 0;
    for (const g of s.games) {
      if (g.actual_spread != null && Math.abs(g.actual_spread) > 0.1) {
        const winner = g.actual_spread > 0 ? g.home_team : g.away_team;
        teamWins[winner] = (teamWins[winner] || 0) + 1;
        if ((g.model_pick === "home") === (g.actual_spread > 0)) pickW++; else pickL++;
      }
      if (g.ats_result === "cover") atsW++;
      else if (g.ats_result === "miss") atsL++;
      else if (g.ats_result === "push") atsP++;
      if (g.ou_result === "over") ouO++;
      else if (g.ou_result === "under") ouU++;
      else if (g.ou_result === "push") ouP++;
    }
    let leader = null, lW = 0, lL = 0;
    for (const [t, w] of Object.entries(teamWins)) {
      if (w > lW) { if (leader) lL = lW; leader = t; lW = w; } else lL += w;
    }
    return {
      label:     s.series_id.split("_")[0].replace("|", " vs "),
      predicted: seriesPredWinner(s.series_id) || "—",
      actual:    leader ? leader + " " + lW + "–" + lL : "—",
      played:    s.games.length,
      pick:      pickW + "–" + pickL,
      ats:       atsW + "–" + atsL + "–" + atsP,
      ou:        ouO + "–" + ouU + "–" + ouP,
    };
  });
}

function residualSparkline(seriesData) {
  const res = seriesData.games.map(g => g.residual).filter(r => r != null);
  if (!res.length) return "";
  const W = 200, H = 56, pad = 8, iH = H - pad * 2;
  const maxAbs = Math.max(...res.map(Math.abs), 3);
  const toX = i  => pad + (i / Math.max(res.length - 1, 1)) * (W - pad * 2);
  const toY = v  => pad + ((maxAbs - v) / (maxAbs * 2)) * iH;
  const zeroY = toY(0);
  const pts = res.map((r, i) => toX(i) + "," + toY(r)).join(" ");
  const correction = seriesData.active_correction;
  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:' + H + 'px;display:block;border-radius:4px;background:var(--bg)">';
  svg += '<line x1="' + pad + '" y1="' + zeroY + '" x2="' + (W - pad) + '" y2="' + zeroY + '" stroke="var(--border-strong)" stroke-width="1"/>';
  if (res.length > 1) svg += '<polyline points="' + pts + '" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round"/>';
  res.forEach((r, i) => {
    const fill = r > 1 ? "var(--yellow)" : r < -1 ? "var(--accent)" : "var(--text-mute)";
    svg += '<circle cx="' + toX(i) + '" cy="' + toY(r) + '" r="3" fill="' + fill + '"/>';
    svg += '<text x="' + toX(i) + '" y="' + (toY(r) - 5) + '" fill="var(--text-dim)" font-size="8" text-anchor="middle">G' + (i + 1) + '</text>';
  });
  if (correction != null) {
    const cY = toY(correction);
    svg += '<line x1="' + pad + '" y1="' + cY + '" x2="' + (W - pad) + '" y2="' + cY + '" stroke="var(--yellow)" stroke-width="1" stroke-dasharray="4,3"/>';
  }
  svg += '</svg>';
  return svg;
}

// ========== Today view ==========
function computeStaleness() {
  const gen = new Date(PREDICTIONS.generated_at);
  const diffMs = Date.now() - gen.getTime();
  const diffHrs = diffMs / 3600000;
  const stale = diffHrs > 24;
  let label;
  if (diffHrs < 0.1) label = "just now";
  else if (diffHrs < 1) label = Math.round(diffHrs * 60) + " min ago";
  else {
    const h = Math.floor(diffHrs);
    label = h === 1 ? "1 hour ago" : h + " hours ago";
  }
  return { label, stale };
}

function renderToday() {
  const root = document.getElementById("today-view");
  root.innerHTML = "";

  const staleInfo = computeStaleness();
  const sbar = document.createElement("div");
  sbar.className = "staleness-bar" + (staleInfo.stale ? " stale" : "");
  const dateEl = document.createElement("div");
  dateEl.className = "staleness-date";
  dateEl.textContent = PREDICTIONS.as_of_date;
  sbar.appendChild(dateEl);
  const ageEl = document.createElement("div");
  ageEl.className = "staleness-age" + (staleInfo.stale ? " stale-warn" : "");
  ageEl.textContent = staleInfo.stale
    ? "⚠️ Data may be stale — check pipeline logs. Updated " + staleInfo.label
    : "Data last updated " + staleInfo.label;
  sbar.appendChild(ageEl);
  root.appendChild(sbar);

  const games = PREDICTIONS.today_games || [];
  if (!games.length) {
    const empty = document.createElement("div");
    empty.className = "today-empty";
    empty.textContent = "No games scheduled today.";
    root.appendChild(empty);
    return;
  }

  for (const game of games) {
    root.appendChild(buildTodayCard(game));
  }
}

function buildTodayCard(game) {
  const homeAbbr  = game.home_team;
  const awayAbbr  = game.away_team;
  const winProb   = game.win_prob_base;
  const hasInjury = game.home_star_out || game.away_star_out;

  // Predicted winner determined up front (needed for border color)
  const winnerAbbr = game.predicted_winner === "home" ? homeAbbr : awayAbbr;

  const card = document.createElement("div");
  card.className = "today-card";
  // Left border: predicted winner's team color
  card.style.borderLeft  = "4px solid " + teamColor(winnerAbbr);
  card.style.paddingLeft = "12px";
  // Injury or low-confidence: add a faint red overlay via box-shadow
  if (hasInjury) {
    card.style.boxShadow = "inset 0 0 0 1px rgba(231,76,60,0.25), var(--shadow)";
  }

  // Teams header — logos + abbreviations
  const teamsEl = document.createElement("div");
  teamsEl.className = "today-teams";
  teamsEl.style.display = "flex";
  teamsEl.style.alignItems = "center";
  teamsEl.style.gap = "6px";
  teamsEl.style.flexWrap = "wrap";

  const hLogo = teamLogoEl(homeAbbr, "tl-sm");
  teamsEl.appendChild(hLogo);
  teamsEl.appendChild(document.createTextNode(homeAbbr));

  const vsEl = document.createElement("span");
  vsEl.style.cssText = "color:var(--text-mute);font-weight:400;font-size:13px;margin:0 2px";
  vsEl.textContent = "vs";
  teamsEl.appendChild(vsEl);

  const aLogo = teamLogoEl(awayAbbr, "tl-sm");
  teamsEl.appendChild(aLogo);
  teamsEl.appendChild(document.createTextNode(awayAbbr));

  card.appendChild(teamsEl);

  // Series context
  const ctxEl = document.createElement("div");
  ctxEl.className = "today-ctx";
  let ctxParts = [];
  if (game.series_game_number) ctxParts.push("Game " + game.series_game_number);
  if (game.series_id) {
    const teamPart = game.series_id.split("_")[0] || "";
    ctxParts.push(teamPart.replace("|", " vs "));
  }
  ctxEl.textContent = ctxParts.join(" · ") || "Playoff game";
  card.appendChild(ctxEl);

  // 2×2 grid: winner | spread | total | market
  const grid = document.createElement("div");
  grid.className = "today-grid";

  // Cell: Predicted Winner
  // winnerAbbr already computed at top of function
  const winnerProb = winProb != null
    ? (game.predicted_winner === "home" ? winProb : 1 - winProb)
    : null;
  const winnerCell = document.createElement("div");
  winnerCell.innerHTML =
    '<div class="tg-label">Predicted Winner</div>' +
    '<div class="tg-winner">' + winnerAbbr +
    (winnerProb != null
      ? ' <span style="font-weight:400;font-size:12px;color:var(--text-dim)">' + (winnerProb * 100).toFixed(1) + '%</span>'
      : '') +
    '</div>';
  grid.appendChild(winnerCell);

  // Cell: Spread — base always shown; adjusted shown alongside when override active; flip indicator when winner crosses 50%

    ((winProb >= 0.5) !== (game.win_prob_adjusted >= 0.5));
